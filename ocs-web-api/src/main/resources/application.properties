# ===============================
# Datasource - Oracle
# ===============================
#spring.datasource.url=jdbc:oracle:thin:@//192.168.18.106:1521/SDP
#spring.datasource.url=jdbc:oracle:thin:@//192.168.18.138:1521/SDP
spring.datasource.url=jdbc:oracle:thin:@//147.139.247.189:1521/SDP
spring.datasource.username=sts
spring.datasource.password=sts123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ===============================
# Connection Pool - HikariCP
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=HikariCP
spring.datasource.hikari.auto-commit=true

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.show_sql=false
hibernate.globally_quoted_identifiers=true

# ===============================
# Logging SQL with P6Spy
# ===============================
decorator.datasource.enabled=${SQL_LOGGING_ENABLED:true}
decorator.datasource.p6spy.enable-logging=${SQL_LOGGING_ENABLED:true}
decorator.datasource.p6spy.multiline=false
decorator.datasource.p6spy.logging=slf4j
logging.level.p6spy=${SQL_LOGGING_LEVEL:INFO}

# ===============================
# Logging Application
# ===============================
app.logging.request.enabled=${REQUEST_LOGGING_ENABLED:true}
logging.level.root=INFO
logging.level.com.sts.sinorita.helper=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [traceId=%X{traceId}] %logger{36} - %msg%n

# ===============================
# Messages
# ===============================
spring.messages.always-use-message-format=false

# Untuk dev sesuaikan dengan path resource masing-masing jangan di-commit.
# Untuk deploy di cloud mohon comment spring.messages.basename karena akan nembak ke /apps secara otomatis.
# Contoh penggunaan local dev:
#spring.messages.basename=/Users/sweli/Documents/workspace/ocs-web-api
spring.messages.basename=/apps

spring.messages.cache-duration=3600
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=true
spring.messages.use-code-as-default-message=false

# ===============================
# Security - JWT
# ===============================
security.jwt.secret-key=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b

# 1h in milliseconds
security.jwt.expiration-time=3600000
#security.jwt.expiration-time=1577880000000

# ===============================
# Swagger / OpenAPI
# ===============================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
