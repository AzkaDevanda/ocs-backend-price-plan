BILLING.BMC_PYTHON_SCRIPT_RULE1=1. Function's head must have [def main( r )\:] which shows a beginning of function, and the [r]shows any objects. Its name can define free, but it must be consistent with the object-name of the latter code. 
BILLING.BMC_PYTHON_SCRIPT_RULE2=2. Function's tail must finish up with [r.SetResult(res) ]. The res that may be any character except keywords shows the number variable defined by self. 
BILLING.BMC_PYTHON_SCRIPT_RULE3=3. [\:]indicates the end of a code paragraph. The following code should start a new line with four-blank indent. 
BILLING.BMC_PYTHON_SCRIPT_RULE4=4. The blue show the keywords of Python. 
BILLING.BMC_PYTHON_SCRIPT_RULE5=5. The black-thick show the system's public means of CC&B. The r object of [def main( r ):]on the function head have three means --[GetValue]. [GetAverageValue]. [SetResult].
BILLING.BMC_PYTHON_SCRIPT_RULE6=6. [GetValue] and [GetAverageValue] have three parameters. The first is the program Code, and the second is the KPI Code. The [GetValue]'s third parameter is the current billing cycle offset(&lt;\=0),and The [GetAverageValue]'s third parameter is the billing cycle count(&gt;0).
