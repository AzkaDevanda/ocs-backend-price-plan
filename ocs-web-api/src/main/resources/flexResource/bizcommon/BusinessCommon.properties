BUSINESS.PYTHON_SCRIPT_RULE1=. Function's head must inclued [def main(r)\:] as the beginning of a function, in which the [r] denote whatever objects that can be assigned with a name in any form, as long as it is consistent with the object name in latter code.
BUSINESS.PYTHON_SCRIPT_RULE2=. Function's tail must finish up with [r.setResult(res)].The [res], which must be boolean type.
BUSINESS.PYTHON_SCRIPT_RULE3=. [\:] shows a paragraph of code. Sentences after the [\:] and within the same paragraph of code, must be laid out with a four-blank indent at every new line.
BUSINESS.PYTHON_SCRIPT_RULE4=. The blue show the keywords of Python.
BUSINESS.PYTHON_SCRIPT_RULE5=. The r object of [def main( r )\:]on the function head have methods -- which have be defined in the PythonEvent class.


