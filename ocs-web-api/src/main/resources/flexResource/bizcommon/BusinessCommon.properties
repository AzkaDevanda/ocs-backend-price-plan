CUSTCT.MESSAGE_DEFINE_HELP=1. Sms template e.g. \n Honorific %CustName%,You recharge {RechargeAmount :C,D=2,K=1}$ before one hour,ExpireDate {BalExpdate:D}. \n &&[<{BalCode}IN'FreeTime'|'FreeSMS'>you obtain ][<{BalCode}=='FreeTime'> free call {BalAmount:N, P=A/10,K=1,D=2,R=1}munites.] \n [<{BalCode}=='FreeSMS'>free SMS {BalAmount}.] \n 2. Paramete Type: \n S: String type; N number type;C currency type;B balance type;D date type;T time type \n E.G. \n {RechargeAmount:C,D=2,K=1} \n 3. Format parameter sign \n K kilobit,D decimal,R round,P  precision formula \n E.G. \n {BalAmount:N, P=A*10,K=1,D=2,R=1} means that BalAmount is number type, P=A*10 means BalAmount multiply10, K=1 means parameter need kilobit,D=1 means one \n place decimal Number, R=1 means parameter  need round. \n If BalAmount is 124.365 , the instance of template is free call 1243.7 minutes."
