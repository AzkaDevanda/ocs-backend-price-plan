BILLING.PYTHON_SCRIPT_RULE1=. Function's head must include [def main(r)\:] as the beginning of a function, in which the [r] denote whatever objects that can be assigned with a name in any form, as long as it is consistent with the object name in latter code. 
BILLING.PYTHON_SCRIPT_RULE2=. Function's tail must finish up with [r.SetResult(res) ]. The [res], which may be whatever character except keywords, shows the variable defined by itself. 
BILLING.PYTHON_SCRIPT_RULE3=. [\:]shows a paragraph of code. sentences after the [\:] and within the same paragraph of code, must be laid out with a four-blank indent at every new line. 
BILLING.PYTHON_SCRIPT_RULE4=. The blue show the keywords of Python.
BILLING.PYTHON_SCRIPT_RULE5=. The black-thick show the system's public means of CC&B. The r object of [def main( r )\:]on the function head have a property--[event], and two methods --[SetResult]. [GetResult]. 
BILLING.PYTHON_SCRIPT_RULE6=. [event]have two methods--[SetAttr]. [GetAttr], and they can apply to the value of set[event-property] and get[event-property]. The first property of a method shows the name of [event-property]. 
BILLING.PYTHON_SCRIPT_RULE7=. [GetAttr]have two sub-function--[AsInteger]. [AsString]. 
BILLING.PYTHON_SCRIPT_TRIGGER_RULE=. Function's head must include [def rule_main(r)\:] as the beginning of a function, in which the [r] denote whatever objects that can be assigned with a name in any form, as long as it is consistent with the object name in latter code. 
